<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Consultant</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
  <header class="hero">
    <nav class="nav">
      <div class="brand" id="brandName">AI Consultant</div>
      <div class="nav-links">
        <a href="#about">About</a>
        <a href="#services">Services</a>
        <a href="#contact">Contact</a>
      </div>
    </nav>

    <section class="hero-content">
      <p class="eyebrow">AI TRAINING • STRATEGY • DEVELOPMENT SUPPORT</p>
      <h1 id="heroName">Loading...</h1>
      <p class="tagline" id="heroTagline"></p>
      <div class="cta-row">
        <a class="btn primary" id="primaryContact" href="#contact">Contact Me</a>
        <a class="btn secondary" href="#services">View Services</a>
      </div>
    </section>
  </header>

  <main>
    <section class="section" id="about">
      <div class="section-heading">
        <p class="section-label">About</p>
        <h2>Who I am</h2>
      </div>
      <p class="about-text" id="aboutText"></p>
    </section>

    <section class="section" id="services">
      <div class="section-heading">
        <p class="section-label">Services</p>
        <h2>What I offer</h2>
      </div>
      <div class="card-grid" id="servicesGrid"></div>
    </section>

    <section class="section" id="contact">
      <div class="section-heading">
        <p class="section-label">Contact</p>
        <h2>Let’s talk</h2>
      </div>
      <p class="contact-copy" id="contactIntro"></p>
      <div class="contact-actions" id="contactActions"></div>
    </section>
  </main>

  <footer class="footer">
    <p id="footerText">© <span id="year"></span> AI Consultant</p>
  </footer>

  <script src="assets/app.js"></script>
</body>
</html>
